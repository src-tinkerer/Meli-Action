name: دانلودر یوتیوب


on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'YouTube video URL'
        required: true
        type: string
      output_format:
        description: 'Output type'
        required: true
        type: choice
        options:
          - mp4 (video)
          - mp3 (audio only)
        default: 'mp4 (video)'
      desired_quality:
        description: 'Quality preset (video: 144p|360p|480p|720p|1080p; audio: 64|128|192|320kbps)'
        required: false
        type: string
        default: '720p'
      max_part_mb:
        description: 'Maximum part size in MB (0 = do not split)'
        required: false
        type: number
        default: 90
      output_folder:
        description: 'Folder to store downloaded file and archives (relative to repo root)'
        required: false
        type: string
        default: 'downloads'
      compressed_splits:
        description: 'Make compressed splits or just split into different videos'
        required: false
        type: number
        default: 1

permissions:
  contents: write

jobs:
  fetch-and-store:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Clone repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y zip curl jq python3 ffmpeg tor

      - name: Setup Tor proxy
        id: setup-tor
        run: |
          sudo systemctl restart tor

          echo "Waiting for Tor to bootstrap..."
          sleep 10

          # Test Tor connection
          MAX_RETRIES=30
          RETRY_COUNT=0
          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            if sudo systemctl is-active --quiet tor; then
              HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --socks5-hostname 127.0.0.1:9050 https://check.torproject.org/api/ip 2>/dev/null || echo "000")
              if [ "$HTTP_CODE" = "200" ]; then
                TOR_IP=$(curl -s --socks5-hostname 127.0.0.1:9050 https://check.torproject.org/api/ip 2>/dev/null | grep -o '"IP":"[^"]*"' | cut -d'"' -f4 || echo "unknown")
                echo "✅ Tor is running and accessible via proxy (IP: $TOR_IP)"
                echo "TOR_PROXY=socks5://127.0.0.1:9050" >> $GITHUB_ENV
                break
              fi
            fi
            RETRY_COUNT=$((RETRY_COUNT + 1))
            echo "Waiting for Tor to be ready... ($RETRY_COUNT/$MAX_RETRIES)"
            sleep 5
          done
          
          if [ $RETRY_COUNT -eq $MAX_RETRIES ]; then
            echo "⚠️ Tor failed to bootstrap within timeout, continuing without proxy..."
            echo "TOR_PROXY=" >> $GITHUB_ENV
          fi

      - name: Retrieve media file
        id: retrieval
        run: |
          # Install yt-dlp
          pip install yt-dlp
          
          # Run yt-dlp with the specified parameters
          URL="${{ github.event.inputs.video_url }}"
          FMT="${{ github.event.inputs.output_format == 'mp3 (audio only)' && 'mp3' || 'mp4' }}"
          QUAL="${{ github.event.inputs.desired_quality }}"
          OUT_DIR="${{ github.event.inputs.output_folder }}"

          for i in {1..10}; do
            # Normalise quality string
            TOR_USER=$(openssl rand -hex 8)
            TOR_PASS=$(openssl rand -hex 16)
            if [ "$FMT" = "mp3" ]; then
              case "$QUAL" in
                64kbps) BITRATE="64K" ;;
                128kbps) BITRATE="128K" ;;
                192kbps) BITRATE="192K" ;;
                320kbps) BITRATE="320K" ;;
                *) BITRATE="192K" ;;
              esac
              
              # Download as MP3
              yt-dlp \
                -x \
                --proxy "socks5://${TOR_USER}:${TOR_PASS}@127.0.0.1:9050" \
                --audio-format mp3 \
                --audio-quality "$BITRATE" \
                -o "$OUT_DIR/%(title)s_%(id)s_${QUAL}.%(ext)s" \
                "$URL"
            else
              case "$QUAL" in
                144p) RES="144" ;;
                360p) RES="360" ;;
                480p) RES="480" ;;
                720p) RES="720" ;;
                1080p) RES="1080" ;;
                *) RES="720" ;;
              esac
              
              # Download as MP4 with specific quality
              yt-dlp \
                --proxy "socks5://${TOR_USER}:${TOR_PASS}@127.0.0.1:9050" \
                -f "bestvideo[height<=$RES]+bestaudio/best[height<=$RES]" \
                --merge-output-format mp4 \
                -o "$OUT_DIR/%(title)s_%(id)s_${QUAL}.%(ext)s" \
                "$URL"
            fi
          done
          
          # Get the actual filename that was downloaded
          cd "$OUT_DIR"
          DOWNLOADED_FILE=$(ls -t *.${FMT} 2>/dev/null | head -1)
          
          if [ -z "$DOWNLOADED_FILE" ]; then
            echo "Failed to download file"
            exit 1
          fi
          
          # Save information for the next steps
          mkdir -p "$OUT_DIR"
          echo "$DOWNLOADED_FILE" > "$OUT_DIR/.download_info"
          echo "$FMT" >> "$OUT_DIR/.download_info"
          echo "$QUAL" >> "$OUT_DIR/.download_info"
          
          echo "Ready: $DOWNLOADED_FILE"
        env:
          INPUT_URL: ${{ github.event.inputs.video_url }}
          INPUT_FORMAT: ${{ github.event.inputs.output_format == 'mp3 (audio only)' && 'mp3' || 'mp4' }}
          INPUT_QUALITY: ${{ github.event.inputs.desired_quality }}
          INPUT_OUTPUT_FOLDER: ${{ github.event.inputs.output_folder }}
      
      - name: Verify download
        run: |
          OUTPUT_FOLDER="${{ github.event.inputs.output_folder }}"
          INFO="$OUTPUT_FOLDER/.download_info"
          
          if [ ! -f "$INFO" ]; then
            echo "Download info file not found!"
            exit 1
          fi
          
          FILE_NAME=$(head -1 "$INFO")
          
          if [ -f "$OUTPUT_FOLDER/$FILE_NAME" ]; then
            FILE_SIZE=$(du -h "$OUTPUT_FOLDER/$FILE_NAME" | cut -f1)
            echo "Successfully downloaded: $FILE_NAME (Size: $FILE_SIZE)"
          else
            echo "File not found: $OUTPUT_FOLDER/$FILE_NAME"
            exit 1
          fi

      - name: Split oversized files (optional)
        run: |
          OUTPUT_FOLDER="${{ github.event.inputs.output_folder }}"
          THRESH_MB=${{ github.event.inputs.max_part_mb }}
          COMPRESS=${{ github.event.inputs.compressed_splits }}
          THRESH_BYTES=$((THRESH_MB * 1024 * 1024))
          wget https://raw.githubusercontent.com/c0decracker/video-splitter/refs/heads/master/ffmpeg-split.py
          cd "$OUTPUT_FOLDER/parts"
          for f in *; do
            if [ -f "$f" ]; then
              fs=$(stat -c%s "$f")
              if [ "$THRESH_BYTES" -gt 0 ] && [ "$fs" -gt "$THRESH_BYTES" ]; then
                if [ "$COMPRESS" -gt 0 ]; then
                  zip -r -s "${THRESH_MB}m" "../${f}.zip" "$f"
                else
                  python3 ../../ffmpeg-split.py -f "$f" -S "${THRESH_BYTES}" -o ".."
                fi
                rm "$f"
              else
                mv "$f" ..
              fi
            fi
          done
          cd ../..
          rm -rf "$OUTPUT_FOLDER/parts" "$OUTPUT_FOLDER/.download_info"

      - name: Push changes to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${{ github.event.inputs.output_folder }}/"
          git commit -m "Download YouTube media [skip ci]" || echo "Nothing to commit"
          git push
